<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products Listing - MINABAZAR</title>
    <link href="https://cdn.tailwindcss.com" rel="stylesheet">
</head>
<body class="bg-gray-100">
    <div class="container mx-auto px-4 py-6">
        <h1 class="text-3xl font-bold text-center mb-6">Products Listing</h1>
        <div class="flex justify-between mb-4">
            <input type="text" placeholder="Search products..." class="border border-gray-300 rounded px-4 py-2 w-1/3">
            <select class="border border-gray-300 rounded px-4 py-2 w-1/3">
                <option value="">Select Category</option>
                <option value="electronics">Electronics</option>
                <option value="clothing">Clothing</option>
                <option value="accessories">Accessories</option>
                <option value="home">Home & Garden</option>
                <option value="toys">Toys</option>
            </select>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="bg-white p-4 rounded shadow">
                <h2 class="text-xl font-semibold">Product 1</h2>
                <p class="text-gray-600">Description for product 1.</p>
                <p class="font-bold text-lg">$19.99</p>
            </div>
            <div class="bg-white p-4 rounded shadow">
                <h2 class="text-xl font-semibold">Product 2</h2>
                <p class="text-gray-600">Description for product 2.</p>
                <p class="font-bold text-lg">$29.99</p>
            </div>
            <div class="bg-white p-4 rounded shadow">
                <h2 class="text-xl font-semibold">Product 3</h2>
                <p class="text-gray-600">Description for product 3.</p>
                <p class="font-bold text-lg">$39.99</p>
            </div>
            <!-- Repeat product cards as needed -->
        </div>
    </div>
</body>
</html>
